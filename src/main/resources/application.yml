server:
  port: 8082

spring:
  application:
    name: property-service

  datasource:
    url: jdbc:mysql://localhost:3306/property_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
